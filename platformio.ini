[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DUSE_NIMBLE
  ; -DWIFI_SSID=\"YourWiFiName\"
  ; -DWIFI_PASSWORD=\"YourWiFiPassword\"
lib_deps =
  t-vk/ESP32 BLE Keyboard
  h2zero/NimBLE-Arduino@^1.4.3
  m5stack/M5Unified
